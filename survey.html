<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Command Center - Survey Engine</title>
    <style>
        /* Sleek Premium Aesthetic */
        :root {
            --bg-dark: #0f1115; 
            --card-bg: #1c2128;
            --accent: #E50914; 
            --accent-hover: #b20710;
            --text-main: #f5f5f1;
            --text-muted: #8b949e;
            --border-color: #30363d;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        h2 { margin: 0; font-weight: 600; font-size: 24px; letter-spacing: -0.5px; }
        h3 { margin-top: 0; font-size: 16px; color: #fff; font-weight: 500; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 20px; }
        
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            align-items: start;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-group.full-width { grid-column: 1 / -1; }
        
        label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        input, select, textarea {
            background: #0d1117;
            border: 1px solid var(--border-color);
            color: #c9d1d9;
            padding: 14px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(229, 9, 20, 0.2);
        }
        
        .canvas-container {
            background: #000;
            border-radius: 10px;
            width: 100%;
            height: 450px;
            border: 2px dashed var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        canvas {
            max-width: 100%;
            max-height: 100%;
        }
        
        .action-bar {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        button:hover { background: var(--accent-hover); transform: translateY(-1px); }
        button:disabled { background: #555; cursor: not-allowed; transform: none; }
        
        .btn-secondary {
            background: #21262d;
            border: 1px solid var(--border-color);
            color: #c9d1d9;
        }
        .btn-secondary:hover { background: #30363d; border-color: #8b949e; }
        
        @media (max-width: 900px) {
            .grid-container { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Command Center</h2>
        <select id="brandSelect" style="width: auto; padding: 10px 15px; font-size: 14px; background: #1c2128;"></select>
    </div>

    <div class="grid-container">
        <div style="display: flex; flex-direction: column; gap: 25px;">
            
            <div class="card">
                <h3>Client Profile</h3>
                <div class="form-grid">
                    <div><label>Lead Name *</label><input type="text" id="clientName" placeholder="e.g. John Doe"></div>
                    <div><label>Customer Number</label><input type="tel" id="clientNum" placeholder="12345"></div>
                    <div><label>Postcode *</label><input type="text" id="postCode" placeholder="S70 1AA"></div>
                    <div><label>Consultation Date</label><input type="date" id="apptDate"></div>
                    <div><label>Revisit Date</label><input type="date" id="revisitDate"></div>
                    <div><label>Revisit Location</label><input type="text" id="revisitLocation" placeholder="e.g. Showroom"></div>
                </div>
            </div>

            <div class="card">
                <h3>Site Survey Basics</h3>
                <div class="form-grid">
                    <div><label>DPC Depth (mm)</label><input type="text" id="dpcDepth" placeholder="150"></div>
                    <div><label>Finished Floor Level</label><input type="text" id="ffl" placeholder="Level with DPC"></div>
                    <div>
                        <label>Floor Type</label>
                        <select id="floorType">
                            <option value="">Select...</option>
                            <option value="Solid">Solid</option>
                            <option value="Joisted">Joisted</option>
                        </select>
                    </div>
                    <div>
                        <label>Drainage</label>
                        <select id="drainage">
                            <option value="">Select...</option>
                            <option value="MH">MH</option>
                            <option value="RWP">RWP</option>
                            <option value="Soil">Soil</option>
                            <option value="Gulley">Gulley</option>
                        </select>
                    </div>
                    <div><label>Ext Brick Match</label><input type="text" id="extBrickMatch" placeholder="e.g. Red wirecut"></div>
                    <div><label>Base Type</label><input type="text" id="baseType" placeholder="e.g. Concrete"></div>
                </div>
            </div>

            <div class="card">
                <h3>Design & Logistics</h3>
                <div class="form-grid">
                    <div>
                        <label>Roof System</label>
                        <select id="roofSystem">
                            <option value="">Select...</option>
                            <option value="Edwardian roof">Edwardian roof</option>
                            <option value="Victorian">Victorian</option>
                            <option value="Lean-to">Lean-to</option>
                            <option value="Gable">Gable</option>
                        </select>
                    </div>
                    <div><label>Roof Pitch</label><input type="text" id="roofPitch" placeholder="e.g. 25 degrees"></div>
                    <div>
                        <label>Frame Colour (Ext)</label>
                        <select id="frameColour">
                            <option value="">Select...</option>
                            <option value="White">White</option>
                            <option value="Anthracite Grey">Anthracite Grey</option>
                            <option value="Rosewood">Rosewood</option>
                            <option value="Light Oak">Light Oak</option>
                        </select>
                    </div>
                    <div>
                        <label>Frame Colour (Int)</label>
                        <select id="internalFrameColour">
                            <option value="White">White</option>
                            <option value="Match External">Match External</option>
                        </select>
                    </div>
                    <div>
                        <label>Building Regs?</label>
                        <select id="buildingRegs">
                            <option value="">Select...</option>
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>
                    <div>
                        <label>Planning Perms?</label>
                        <select id="planningPerms">
                            <option value="">Select...</option>
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>
                </div>
            </div>
            
        </div>

        <div style="display: flex; flex-direction: column; gap: 25px;">
            
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 20px;">
                    <h3 style="border: none; margin: 0; padding: 0;">Elevation Markup (Sniper Engine)</h3>
                    <button id="btn-upload-sniper" class="btn-secondary" style="padding: 8px 12px; font-size: 12px; flex: none;">📷 Load Photo</button>
                </div>
                
                <div class="canvas-container">
                    <canvas id="sniperCanvas" width="800" height="600"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>Designer Notes & Processing</h3>
                <div class="form-group full-width">
                    <textarea id="designerNotes" rows="4" placeholder="Enter rough notes here..."></textarea>
                </div>
                <button id="btn-ai-polish" class="btn-secondary" style="margin-top: 10px; width: 100%;">✨ AI Polish Notes</button>
                
                <div class="action-bar">
                    <button id="btn-sync" class="btn-secondary">Save & Sync</button>
                    <button id="btn-generate-pdf">Generate PDF Pack</button>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="./js/ui-survey.js"></script>
    <script>
        // Hook to allow the Load Photo button to send images into the Sniper Canvas
        document.getElementById('btn-upload-sniper')?.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = (event) => window.dispatchEvent(new CustomEvent('loadSniperImage', {detail: event.target.result}));
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        });
    </script>
</body>
</html>
