<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Engine | Command Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body { background: #0d1117; color: #f0f6fc; font-family: -apple-system, sans-serif; padding: 20px; }
        .header { margin-bottom: 20px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .drop-zone { background: #090d13; border: 2px dashed #E50914; padding: 40px; text-align: center; border-radius: 12px; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        .drop-zone:hover { background: rgba(229, 9, 20, 0.1); }
        .tier-card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .btn-sync { background: #E50914; color: white; padding: 15px; border: none; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; display: none; text-transform: uppercase; }
        .success-box { display: none; background: #238636; padding: 20px; border-radius: 6px; text-align: center; margin-top: 20px; font-weight: bold; }
        .success-box a { color: white; text-decoration: underline; font-size: 18px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">U-Design Scraper</h2>
        <p id="statusHeader" style="color: #8b949e; margin-top: 5px;">Checking connection to customer...</p>
    </div>
    
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <h3>Drop U-Design Scope of Works Here</h3>
        <p style="color: #8b949e;">or tap to browse files</p>
        <input type="file" id="fileInput" accept="application/pdf" style="display: none;">
    </div>

    <div id="tiersContainer"></div>
    <button id="btnSaveQuotes" class="btn-sync">Save to Vault & Generate Link</button>
    
    <div id="successBox" class="success-box">
        Quote Successfully Saved! <br><br>
        <a href="#" id="portalLink" target="_blank">Open Customer Vault Presentation</a>
    </div>

    <script type="module">
        import { db, doc, setDoc } from './js/core-firebase.js';
        
        // Ensure we are attached to a specific customer via the URL
        const urlParams = new URLSearchParams(window.location.search);
        const currentLeadId = urlParams.get('leadId');
        
        if(!currentLeadId) {
            document.getElementById('statusHeader').innerText = "⚠️ Error: No Customer ID detected. Go back to Dashboard and click 'Build Quote'.";
            document.getElementById('statusHeader').style.color = "#E50914";
            document.getElementById('dropZone').style.display = "none";
        } else {
            document.getElementById('statusHeader').innerText = `Securely linked to Lead ID: ${currentLeadId}`;
        }

        let finalQuoteData = {};

        // Setup PDF Engine
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;

            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
            let rawText = "";

            for(let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                rawText += textContent.items.map(item => item.str).join(" ") + " ";
            }

            // CLEAN THE U-DESIGN NIGHTMARE: Strip quotes and line breaks, turn into comma separated data
            const cleanText = rawText.replace(/[\n\r"]/g, ' ').replace(/\s+/g, ' ');
            console.log("Cleaned U-Design Text:", cleanText);

            // Precision Extraction Logic for U-Design format
            const getMatch = (regex, fallback) => {
                const match = cleanText.match(regex);
                return match ? match[1].trim() : fallback;
            };

            const grandTotal = getMatch(/GRAND TOTAL\s*£?\s*([\d,.]+)/i, "TBC");
            const roofSystem = getMatch(/Roof System\s*,\s*([^,]+)/i, "Standard");
            const frames = getMatch(/Window Type\s*,\s*([^,]+)/i, "Standard");
            const doors = getMatch(/Door Type\s*,\s*([^,]+)/i, "Standard");
            const frameColour = getMatch(/Frame Colour Out\s*,\s*([^,]+)/i, "White");
            
            // Note: U-Design dimensions layout can vary, pulling safely.
            const width = getMatch(/Width\s*,\s*(\d+)/i, "Surveyed");
            const projection = getMatch(/Projection\s*,\s*(\d+)/i, "Surveyed");

            finalQuoteData = {
                isUnlocked: false, // Starts locked as a Teaser
                totalPrice: `£${grandTotal}`,
                dimensions: `${width}mm x ${projection}mm`,
                roofType: roofSystem,
                windowSpecs: `${frames} (${frameColour}) with ${doors}`
            };

            // Display to the Designer before saving
            document.getElementById('tiersContainer').innerHTML = `
                <div class="tier-card">
                    <h4 style="margin-top:0; color: #8b949e; text-transform: uppercase;">Extracted Specification</h4>
                    <h2 style="margin:10px 0; font-size: 32px; color: #fff;">£${grandTotal}</h2>
                    <ul style="color: #c9d1d9; line-height: 1.8; font-size: 14px; padding-left: 0; list-style: none;">
                        <li><b style="color:#fff;">Dimensions:</b> ${width}mm x ${projection}mm</li>
                        <li><b style="color:#fff;">Roof System:</b> ${roofSystem}</li>
                        <li><b style="color:#fff;">Frames & Glazing:</b> ${frames} / ${doors} / ${frameColour}</li>
                    </ul>
                </div>
            `;
            
            document.getElementById('btnSaveQuotes').style.display = "block";
        });

        // The Fix: Save Button pushes securely to the specific customer ID
        document.getElementById('btnSaveQuotes').addEventListener('click', async () => {
            try {
                document.getElementById('btnSaveQuotes').innerText = "Encrypting & Saving to Vault...";
                
                // Uses setDoc to push to the 'quotes' collection under the specific leadId
                await setDoc(doc(db, "quotes", currentLeadId), finalQuoteData, { merge: true });
                
                document.getElementById('btnSaveQuotes').style.display = "none";
                document.getElementById('successBox').style.display = "block";
                
                // Generates the final portal link
                document.getElementById('portalLink').href = `portal.html?id=${currentLeadId}`;
            } catch(e) {
                alert("Database Save Error. Check Console.");
                console.error("Save Error Details:", e);
            }
        });
    </script>
</body>
</html>
